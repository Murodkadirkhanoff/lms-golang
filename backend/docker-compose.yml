# Ikki rejim:
#   dev  (make up)      — faqat db + gateway docker'da, Go servislar va
#                         frontend hostda ishlaydi (tez hot-reload).
#   full (make up/full) — butun tizim docker'da: db, 3 servis, gateway,
#                         frontend. Faqat 4000 (API) va 3000 (frontend)
#                         portlari ochiq; /internal/* va Postgres yopiq.

services:
  db:
    image: postgres:17
    container_name: lms-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      # Hostda 5433 — 5432 boshqa loyihaning Postgres konteyneri band qilgan.
      # Docker tarmog'i ichida servislar baribir db:5432 ga ulanadi.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # --- dev profil: servislar hostda, gateway host.docker.internal'ga proxy ---

  gateway:
    profiles: ["dev"]
    image: nginx:alpine
    container_name: lms-gateway
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- full profil: butun tizim docker'da ---

  gateway-full:
    profiles: ["full"]
    image: nginx:alpine
    container_name: lms-gateway-full
    restart: unless-stopped
    ports:
      - "4000:80"
    volumes:
      - ./gateway/nginx.full.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - auth-service
      - course-service
      - enrollment-service

  auth-service:
    profiles: ["full"]
    build:
      context: .
      args:
        SERVICE: auth-service
    container_name: lms-auth
    restart: unless-stopped
    environment:
      AUTH_DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/lms_auth?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_KEY: ${INTERNAL_KEY}
      CORS_TRUSTED_ORIGINS: ${CORS_TRUSTED_ORIGINS:-http://localhost:3000}
      COURSE_SERVICE_URL: http://course-service:4002
      ENROLLMENT_SERVICE_URL: http://enrollment-service:4003
    depends_on:
      db:
        condition: service_healthy

  course-service:
    profiles: ["full"]
    build:
      context: .
      args:
        SERVICE: course-service
    container_name: lms-course
    restart: unless-stopped
    environment:
      COURSE_DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/lms_course?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_KEY: ${INTERNAL_KEY}
      CORS_TRUSTED_ORIGINS: ${CORS_TRUSTED_ORIGINS:-http://localhost:3000}
      AUTH_SERVICE_URL: http://auth-service:4001
    depends_on:
      db:
        condition: service_healthy

  enrollment-service:
    profiles: ["full"]
    build:
      context: .
      args:
        SERVICE: enrollment-service
    container_name: lms-enrollment
    restart: unless-stopped
    environment:
      ENROLLMENT_DB_DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/lms_enrollment?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      INTERNAL_KEY: ${INTERNAL_KEY}
      CORS_TRUSTED_ORIGINS: ${CORS_TRUSTED_ORIGINS:-http://localhost:3000}
      COURSE_SERVICE_URL: http://course-service:4002
    depends_on:
      db:
        condition: service_healthy

  frontend:
    profiles: ["full"]
    build:
      context: ../frontend
      # NEXT_PUBLIC_* brauzerda ishlaydi, shuning uchun gateway'ning
      # HOST'dagi manzili ko'rsatiladi (docker-network ichki nomi emas).
      args:
        NEXT_PUBLIC_API_URL: http://localhost:4000/v1
        NEXT_PUBLIC_USE_MOCK: "false"
    container_name: lms-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - gateway-full

volumes:
  pgdata:
