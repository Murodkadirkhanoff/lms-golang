# LMS API Gateway — "full" profil: barcha servislar docker network ichida.
# proxy_pass'da o'zgaruvchi ishlatiladi, shunda nginx docker DNS (127.0.0.11)
# orqali har safar qayta resolve qiladi — servis konteyneri qayta yaratilib
# IP o'zgarsa ham 502 bo'lmaydi. /internal/* va Postgres tashqariga ochilmaydi.

server {
    listen 80;

    resolver 127.0.0.11 valid=10s;

    set $auth_upstream http://auth-service:4001;
    set $course_upstream http://course-service:4002;
    set $enrollment_upstream http://enrollment-service:4003;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Enroll kurs yo'lida tursa ham enrollment-service'niki
    # (regex location'lar prefix'lardan oldin tekshiriladi).
    location ~ ^/v1/courses/[^/]+/enroll$ {
        proxy_pass $enrollment_upstream;
    }

    location /v1/users {
        proxy_pass $auth_upstream;
    }

    location /v1/tokens {
        proxy_pass $auth_upstream;
    }

    location /v1/admin {
        proxy_pass $auth_upstream;
    }

    location /v1/healthcheck {
        proxy_pass $auth_upstream;
    }

    location /v1/me {
        proxy_pass $enrollment_upstream;
    }

    location /v1/enrollments {
        proxy_pass $enrollment_upstream;
    }

    # categories, courses, lessons, instructors, quizzes
    location /v1/ {
        proxy_pass $course_upstream;
    }

    location / {
        return 404 '{"error": "the requested resource could not be found"}';
        add_header Content-Type application/json always;
    }
}
