# LMS API Gateway — path bo'yicha 3 microservice'ga yo'naltiradi.
# Go servislar hostda ishlaydi, nginx docker'da (host.docker.internal).
# /internal/* yo'llar ataylab proxy qilinmaydi — servislararo maxfiy.

upstream auth_service {
    server host.docker.internal:4001;
}

upstream course_service {
    server host.docker.internal:4002;
}

upstream enrollment_service {
    server host.docker.internal:4003;
}

server {
    listen 80;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

    # Enroll kurs yo'lida tursa ham enrollment-service'niki
    # (regex location'lar prefix'lardan oldin tekshiriladi).
    location ~ ^/v1/courses/[^/]+/enroll$ {
        proxy_pass http://enrollment_service;
    }

    location /v1/users {
        proxy_pass http://auth_service;
    }

    location /v1/tokens {
        proxy_pass http://auth_service;
    }

    location /v1/admin {
        proxy_pass http://auth_service;
    }

    location /v1/healthcheck {
        proxy_pass http://auth_service;
    }

    location /v1/me {
        proxy_pass http://enrollment_service;
    }

    location /v1/enrollments {
        proxy_pass http://enrollment_service;
    }

    # categories, courses, lessons, instructors, quizzes
    location /v1/ {
        proxy_pass http://course_service;
    }

    location / {
        return 404 '{"error": "the requested resource could not be found"}';
        add_header Content-Type application/json always;
    }
}
